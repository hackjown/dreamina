services:
  dreamina:
    image: ${IMAGE_NAME:-dreamina-web:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-22}
        VITE_DEFAULT_SESSION_ID: ${VITE_DEFAULT_SESSION_ID:-}
    container_name: dreamina-web
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - VITE_DEFAULT_SESSION_ID=${VITE_DEFAULT_SESSION_ID:-}
    restart: unless-stopped
    shm_size: '512mb'
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - dreamina-data:/app/server/data
    networks:
      - dreamina-network

networks:
  dreamina-network:
    driver: bridge

volumes:
  dreamina-data:
